<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none">
  <!-- Tab bar -->
  <rect x="1" y="2" width="6" height="4" rx="1" fill="rgba(255,255,255,0.9)"/>
  <rect x="9" y="2" width="6" height="4" rx="1" fill="rgba(255,255,255,0.4)"/>
  <rect x="17" y="2" width="6" height="4" rx="1" fill="rgba(255,255,255,0.4)"/>
  <!-- Active tab underline -->
  <rect x="1" y="6" width="6" height="1.5" rx="0.75" fill="#7fff00"/>
  <!-- Grid below tabs -->
  <rect x="1"  y="10" width="6" height="5" rx="1" fill="rgba(255,255,255,0.5)"/>
  <rect x="9"  y="10" width="6" height="5" rx="1" fill="rgba(255,255,255,0.5)"/>
  <rect x="17" y="10" width="6" height="5" rx="1" fill="rgba(255,255,255,0.5)"/>
  <rect x="1"  y="17" width="6" height="5" rx="1" fill="rgba(255,255,255,0.35)"/>
  <rect x="9"  y="17" width="6" height="5" rx="1" fill="rgba(255,255,255,0.35)"/>
  <rect x="17" y="17" width="6" height="5" rx="1" fill="rgba(255,255,255,0.35)"/>
</svg>
