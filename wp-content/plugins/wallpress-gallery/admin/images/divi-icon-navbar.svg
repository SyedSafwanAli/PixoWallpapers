<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none">
  <!-- Navbar bar -->
  <rect x="1" y="3" width="22" height="5" rx="1.5" fill="rgba(255,255,255,0.9)"/>
  <!-- Logo dot accent -->
  <circle cx="5" cy="5.5" r="1.5" fill="#7fff00"/>
  <!-- Nav links (small dots) -->
  <rect x="9"  y="4.5" width="4" height="2" rx="1" fill="rgba(255,255,255,0.5)"/>
  <rect x="15" y="4.5" width="4" height="2" rx="1" fill="rgba(255,255,255,0.5)"/>
  <!-- Search bar below -->
  <rect x="1" y="11" width="18" height="3" rx="1.5" fill="rgba(255,255,255,0.4)"/>
  <circle cx="21" cy="12.5" r="1.5" stroke="rgba(255,255,255,0.9)" stroke-width="1.2" fill="none"/>
  <line  x1="22.1" y1="13.6" x2="23" y2="14.5" stroke="rgba(255,255,255,0.9)" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Quick tags -->
  <rect x="1"  y="17" width="5" height="2" rx="1" fill="rgba(255,255,255,0.35)"/>
  <rect x="8"  y="17" width="5" height="2" rx="1" fill="rgba(255,255,255,0.35)"/>
  <rect x="15" y="17" width="5" height="2" rx="1" fill="rgba(255,255,255,0.35)"/>
  <!-- Accent line at bottom of navbar -->
  <rect x="1" y="21" width="7" height="1.5" rx="0.75" fill="#7fff00"/>
</svg>
